<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #121826;
            color: #e0e7ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 16px 20px;
            background-color: rgba(18, 24, 38, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2a3454;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .status-text {
            font-size: 12px;
            color: #9ca3af;
        }

        /* Main content */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* Chat messages area */
        .chat-area {
            flex-grow: 1;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: #0066cc;
            color: white;
            border-top-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: rgba(30, 41, 59, 0.8);
            color: #e0e7ff;
            border-top-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #6b7280;
            margin-top: 4px;
            text-align: right;
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 12px;
        }

        textarea#message-input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            background-color: rgba(30, 41, 59, 0.6);
            color: #e0e7ff;
            border: none;
            outline: none;
            resize: none;
        }

        .send-btn {
            padding: 12px 24px;
            background-color: #00d4ff;
            color: #121826;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background-color: #00c0e6;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(30, 41, 59, 0.6);
            color: #e0e7ff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: rgba(30, 41, 59, 0.8);
        }

        .camera-btn {
            position: relative;
        }

        .camera-btn::after {
            content: "📷";
            font-size: 20px;
        }

        .ptt-btn {
            position: relative;
        }

        .ptt-btn::after {
            content: "🎤";
            font-size: 20px;
        }

        /* Settings button */
        .settings-btn {
            background-color: rgba(30, 41, 59, 0.6);
            color: #e0e7ff;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background-color: rgba(30, 41, 59, 0.8);
        }

        /* Character counter */
        .char-counter {
            font-size: 10px;
            color: #6b7280;
            margin-left: 4px;
        }

        /* Camera preview (hidden by default) */
        .camera-preview {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(18, 24, 38, 0.95);
            padding: 16px;
            border-top: 1px solid #2a3454;
        }

        .camera-preview.active {
            display: flex;
        }

        .camera-canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(18, 24, 38, 0.9);
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            color: #e0e7ff;
        }

        .close-btn {
            background-color: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 20px;
        }

        .modal-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .setting-item {
            margin-bottom: 12px;
        }

        .setting-label {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .setting-input {
            padding: 8px;
            border-radius: 4px;
            background-color: rgba(30, 41, 59, 0.6);
            color: #e0e7ff;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <span class="logo">≡ Jarvis</span>
            <div style="display: flex; align-items: center; gap: 6px;">
                <div class="status-indicator"></div>
                <span class="status-text" id="connection-status">Connected</span>
            </div>
        </div>
    </header>

    <main>
        <div class="chat-area" id="chat-area">
            <!-- Messages will be added here dynamically -->
        </div>

        <div class="input-area">
            <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
            <button class="send-btn">Send</button>
        </div>

        <div class="action-buttons">
            <button class="settings-btn" id="settings-btn">⚙️</button>
            <button class="action-btn camera-btn" id="camera-btn">📷</button>
            <button class="action-btn ptt-btn" id="ptt-btn">🎤</button>
        </div>

        <!-- Camera preview modal -->
        <div class="modal" id="camera-modal">
            <div class="modal-header">
                <span class="modal-title">Camera</span>
                <button class="close-btn" id="close-camera">&times;</button>
            </div>
            <div class="modal-content">
                <video id="camera-video" style="width: 100%; border-radius: 8px;"></video>
                <canvas id="camera-canvas"></canvas>
                <div style="margin-top: 12px; text-align: center;">
                    <button class="action-btn" id="capture-photo">Capture</button>
                </div>
            </div>
        </div>

        <!-- Settings modal -->
        <div class="modal" id="settings-modal">
            <div class="modal-header">
                <span class="modal-title">Settings</span>
                <button class="close-btn" id="close-settings">&times;</button>
            </div>
            <div class="modal-content">
                <div class="setting-item">
                    <label class="setting-label">API URL:</label>
                    <input type="text" id="api-url-input" class="setting-input" value="http://localhost:5000/chat">
                </div>
                <div class="setting-item">
                    <label class="setting-label">Voice Output:</label>
                    <button id="voice-toggle-btn">Enabled</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Global variables
        let isRecording = false;
        let recognition;
        let mediaStream;
        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.querySelector('.send-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const pttBtn = document.getElementById('ptt-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const connectionStatus = document.getElementById('connection-status');
        const cameraVideo = document.getElementById('camera-video');
        const cameraCanvas = document.getElementById('camera-canvas');
        const cameraModal = document.getElementById('camera-modal');

        // Initialize speech recognition
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                console.log('Web Speech API not supported');
                return;
            }

            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isRecording = true;
                pttBtn.style.backgroundColor = '#ef4444';
                pttBtn.style.animation = 'pulse 0.5s infinite';
            };

            recognition.onresult = function(event) {
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }

                // Add transcription to chat
                addMessage(finalTranscript, 'user');
            };

            recognition.onerror = function(event) {
                console.log('Speech recognition error:', event.error);
                isRecording = false;
                pttBtn.style.backgroundColor = '';
                pttBtn.style.animation = '';
                addMessage(`Error: ${event.error}`, 'bot');
            };

            recognition.onend = function() {
                if (isRecording) {
                    // Send the final transcript
                    sendMessage(finalTranscript);
                }
                isRecording = false;
                pttBtn.style.backgroundColor = '';
                pttBtn.style.animation = '';
            };
        }

        // Initialize camera
        const cameraVideo = document.getElementById('camera-video');
        const cameraCanvas = document.getElementById('camera-canvas');
        const cameraModal = document.getElementById('camera-modal');

        function initCamera() {
            cameraBtn.addEventListener('click', async () => {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    cameraVideo.srcObject = mediaStream;
                    cameraModal.classList.add('active');
                } catch (err) {
                    console.error('Error accessing camera:', err);
                    addMessage('Unable to access camera', 'bot');
                }
            });

            document.getElementById('close-camera').addEventListener('click', () => {
                stopCamera();
                cameraModal.classList.remove('active');
            });

            document.getElementById('capture-photo').addEventListener('click', async () => {
                const context = cameraCanvas.getContext('2d');
                cameraCanvas.width = cameraVideo.videoWidth;
                cameraCanvas.height = cameraVideo.videoHeight;
                context.drawImage(cameraVideo, 0, 0);

                // Convert to base64
                const imageData = cameraCanvas.toDataURL('image/png');

                // Send image data
                sendImage(imageData);

                stopCamera();
                cameraModal.classList.remove('active');
            });
        }

        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        }

        // Add message to chat
        function addMessage(text, sender) {
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;

            if (sender === 'user') {
                messageDiv.innerHTML = `
                    <div>${text}</div>
                    <div class="message-time">${timeString}</div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div>${text}</div>
                    <div class="message-time">${timeString}</div>
                `;
            }

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Send text message
        const API_URL = 'http://localhost:8090';

        async function sendMessage(text) {
            addMessage(text, 'user');
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                const reply = data.reply || 'No response';
                addMessage(reply, 'bot');
                
                // Speak the response if voice enabled
                if (document.getElementById('voice-toggle')?.checked !== false && 'speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(reply);
                    window.speechSynthesis.speak(utterance);
                }
            } catch (err) {
                addMessage('Error: Could not connect to backend. Is the server running?', 'bot');
                console.error('API error:', err);
            }
        }

        // Send image message
        async function sendImage(imageData) {
            const base64Data = imageData.split(',')[1];
            addMessage('📷 Image captured', 'user');
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: 'What do you see in this image? Describe it.',
                        image: base64Data 
                    })
                });
                const data = await response.json();
                const reply = data.reply || 'No response';
                addMessage(reply, 'bot');
                
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(reply);
                    window.speechSynthesis.speak(utterance);
                }
            } catch (err) {
                addMessage('Error: Could not connect to backend.', 'bot');
                console.error('API error:', err);
            }
        }

        // Send button click handler
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                sendMessage(text);
                messageInput.value = '';
            }
        });

        // Text input enter key handler
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Settings button click handler
        settingsBtn.addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('active');
        });

        // Close settings modal
        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.remove('active');
        });

        // Voice toggle button handler
        const voiceToggleBtn = document.getElementById('voice-toggle-btn');
        let voiceEnabled = true;

        voiceToggleBtn.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            voiceToggleBtn.textContent = voiceEnabled ? 'Enabled' : 'Disabled';

            if (voiceEnabled) {
                // Enable speech synthesis
                window.speechSynthesis.onvoiceschanged = function() {
                    const voices = window.speechSynthesis.getVoices();
                    const usEnglishVoice = voices.find(voice =>
                        voice.lang === 'en-US'
                    );

                    if (usEnglishVoice) {
                        window.speechSynthesis.cancel();

                        // Mock speech synthesis
                        const utterance = new SpeechSynthesisUtterance("Jarvis is ready to assist you.");
                        utterance.voice = usEnglishVoice;
                        utterance.rate = 1.0;
                        utterance.pitch = 1.0;
                        utterance.volume = 1.0;

                        window.speechSynthesis.speak(utterance);
                    }
                };
            } else {
                // Cancel any ongoing speech synthesis
                window.speechSynthesis.cancel();
            }
        });

        // PTT button handlers
        function setupPTT() {
            if (!recognition) {
                pttBtn.addEventListener('click', () => {
                    addMessage('Speech recognition not supported in this browser. Use Chrome.', 'bot');
                });
                return;
            }
            
            // Mouse events
            pttBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                recognition.start();
            });
            pttBtn.addEventListener('mouseup', () => recognition.stop());
            pttBtn.addEventListener('mouseleave', () => { if (isRecording) recognition.stop(); });
            
            // Touch events
            pttBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                recognition.start();
            });
            pttBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                recognition.stop();
            });
        }

        // Camera button handler
        function setupCamera() {
            cameraBtn.addEventListener('click', async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    const video = document.getElementById('camera-video');
                    if (video) {
                        video.srcObject = stream;
                        video.play();
                        document.querySelector('.camera-preview')?.classList.add('active');
                    }
                } catch (err) {
                    addMessage('Camera error: ' + err.message, 'bot');
                }
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            initSpeechRecognition();
            initCamera();
            setupPTT();
            setupCamera();

            // Add welcome message
            setTimeout(() => {
                addMessage("Welcome to Jarvis Companion. How can I help you today?", 'bot');
            }, 500);
        });
    </script>
</body>
</html>
